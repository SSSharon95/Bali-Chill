<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bali Chill 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.3.4/vue.global.prod.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F6F4EB; }
        .journal-card { background: #ffffff; border: 2px solid #7DD3FC; border-radius: 20px; box-shadow: 4px 4px 0px #BAE6FD; }
        .tab-btn.active { color: #0369A1; font-weight: 900; border-bottom: 3px solid #38BDF8; }
        .hand-icon { stroke-width: 2.5; }
    </style>
</head>
<body class="flex justify-center min-h-screen">
    <div id="app" class="w-full max-w-md bg-[#FBFBFA] min-h-screen shadow-xl relative flex flex-col pb-24">
        
        <!-- 1. Banner 優化 -->
        <div class="relative w-full h-56 bg-[#BAE6FD] flex items-center justify-start overflow-hidden">
            <img src="Bali Banner.png" alt="Bali Banner" class="h-full object-contain object-left">
            <div class="absolute bottom-4 right-4 text-right">
                <h1 class="text-2xl font-black text-[#0369A1] bg-white/90 px-5 py-2 rounded-2xl shadow-sm tracking-widest">Bali Chill 2026</h1>
            </div>
        </div>

        <!-- 2. 導航列 -->
        <div class="flex bg-white p-2 border-b border-[#BAE6FD] justify-around sticky top-0 z-20">
            <button v-for="tab in tabs" :key="tab.id" @click="currentTab = tab.id" 
                :class="['tab-btn px-3 py-2 text-sm', currentTab === tab.id ? 'active' : 'text-slate-400']">
                {{ tab.name }}
            </button>
        </div>

        <!-- 3. 主要內容區域 -->
        <div class="p-5 space-y-6">
            
            <!-- 行程頁面 -->
            <div v-if="currentTab === 'itinerary'" class="space-y-6">
                <div v-for="day in days" :key="day.id">
                    <h2 class="text-lg font-black text-[#0369A1] mb-3 flex items-center gap-2">
                        <i data-lucide="calendar" class="hand-icon w-5 h-5"></i> Day {{ day.id }} ({{ day.date }})
                    </h2>
                    <div v-for="item in getItinerary(day.id)" :key="item.id" class="journal-card p-5 mb-4">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="font-black text-slate-800 text-lg">{{ item.name }}</h3>
                            <span class="text-xs font-bold text-[#38BDF8] bg-blue-50 px-3 py-1 rounded-full border border-[#BAE6FD]">{{ item.time }}</span>
                        </div>
                        <p class="text-sm font-bold text-slate-500 leading-relaxed">{{ item.desc }}</p>
                    </div>
                </div>
            </div>

            <!-- 清單頁面 -->
            <div v-if="currentTab === 'checklist'">
                <h2 class="text-lg font-black text-[#0369A1] mb-4 flex items-center gap-2"><i data-lucide="check-square" class="hand-icon w-5 h-5"></i> 打包清單</h2>
                <div v-for="item in checklist" :key="item.id" class="journal-card p-4 mb-3 flex items-center">
                    <input type="checkbox" v-model="item.checked" class="mr-4 w-6 h-6 accent-[#38BDF8] cursor-pointer">
                    <span :class="{'line-through text-slate-400': item.checked}" class="text-base font-bold text-slate-700">{{ item.name }}</span>
                </div>
            </div>

            <!-- 資訊與翻譯頁面 -->
            <div v-if="currentTab === 'info'" class="space-y-6">
                <div class="journal-card p-5 bg-gradient-to-br from-amber-50 to-white">
                    <h2 class="font-black text-[#0369A1] mb-3 flex items-center gap-2"><i data-lucide="sun" class="hand-icon w-5 h-5"></i> 當地天氣</h2>
                    <p class="font-bold text-slate-700">☀️ 峇里島：晴朗，體感 32°C</p>
                </div>
                <div class="journal-card p-5">
                    <h2 class="font-black text-[#0369A1] mb-3 flex items-center gap-2"><i data-lucide="languages" class="hand-icon w-5 h-5"></i> 常用印尼語</h2>
                    <div class="space-y-2 text-sm font-bold text-slate-700">
                        <p>謝謝：Terima kasih</p>
                        <p>多少錢：Berapa harganya?</p>
                        <p>買單：Minta bon</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 4. 底部 CTA 分享按鈕 (文字靠右) -->
        <div class="fixed bottom-4 left-4 right-4 z-30">
            <button @click="share" class="w-full bg-[#38BDF8] text-white py-4 rounded-2xl font-black flex justify-between px-8 items-center shadow-lg border-2 border-white hover:scale-[1.01] transition-transform">
                <span class="text-sm">分享我的行程</span>
                <span class="text-[10px] font-bold text-right">點擊複製網址 ➡️</span>
            </button>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted, nextTick } = Vue;
        createApp({
            setup() {
                const currentTab = ref('itinerary');
                const tabs = [
                    {id: 'itinerary', name: '行程'}, 
                    {id: 'checklist', name: '清單'}, 
                    {id: 'info', name: '資訊'}
                ];

                const days = [
                    {id: 1, date: '9/13'}, {id: 2, date: '9/14'}, {id: 3, date: '9/15'},
                    {id: 4, date: '9/16'}, {id: 5, date: '9/17'}, {id: 6, date: '9/18'}
                ];

                const itinerary = ref([
                    { id: 1, day: 1, time: '10:00', name: '抵達巴里島', desc: '辦理落地簽，入住飯店' },
                    { id: 2, day: 2, time: '09:00', name: '烏布深度遊', desc: '體驗傳統銀飾手作與逛市集' },
                    { id: 3, day: 3, time: '15:00', name: '海神廟夕陽', desc: '欣賞巴里島最美日落' },
                    { id: 4, day: 4, time: '10:00', name: '藍夢島水上活動', desc: '浮潛與環島探險' },
                    { id: 5, day: 5, time: '14:00', name: '庫塔悠閒時光', desc: '沙灘衝浪與按摩' },
                    { id: 6, day: 6, time: '09:00', name: '機場返程', desc: '帶著滿滿回憶回家' }
                ]);

                const checklist = ref([
                    { id: 1, name: '護照與簽證影本', checked: false },
                    { id: 2, name: '除氯旅遊花灑頭', checked: false },
                    { id: 3, name: '高係數防曬用品', checked: false },
                    { id: 4, name: '相機與手機充電器', checked: false },
                    { id: 5, name: '常備感冒/止痛藥', checked: false }
                ]);

                onMounted(() => nextTick(() => lucide.createIcons()));

                const getItinerary = (day) => itinerary.value.filter(i => i.day === day);
                const share = () => { 
                    navigator.clipboard.writeText(window.location.href); 
                    alert('已複製網址，分享給旅伴吧！'); 
                };

                return { currentTab, tabs, days, itinerary, checklist, getItinerary, share };
            }
        }).mount('#app');
    </script>
</body>
</html>
