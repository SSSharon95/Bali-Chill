<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌿 Bali Chill - 你的巴里島旅行手帳</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Alpine.js (網頁版輕量狀態管理，免編譯) -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bali: {
                            bg: '#F5EFE6',       // 溫潤手帳米白背景
                            primary: '#85A5FF',  // 哆啦水彩藍
                            accent: '#FFF1B8',   // 奶油黃
                            text: '#4A3E3D',     // 手寫簽字筆深棕色
                        }
                    },
                    borderRadius: {
                        'sketch': '255px 15px 225px 15px/15px 225px 15px 255px' // 手繪不規則圓角
                    }
                }
            }
        }
    </script>
    <style>
        .border-3 { border-width: 3px; }
    </style>
</head>
<body class="bg-bali-bg text-bali-text font-mono p-4 min-h-screen">

    <div x-data="{ 
        activeTab: 'itinerary',
        expenses: [{ id: 1, title: 'Baked. Cafe 早餐', idr: 250000, people: 3 }],
        newTitle: '',
        newIdr: '',
        newPeople: 3,
        translateText: '',
        translateResult: '',
        checklist: [
            { id: 1, text: '護照與印尼電子簽證 (e-VOA)', done: true },
            { id: 2, text: '防曬乳與萬用插頭 (兩腳圓頭)', done: false },
            { id: 3, text: '防蚊液 (峇里島必備)', done: false }
        ],
        spots: [
            { name: 'Baked. Cafe (Canggu)', time: '09:00', lat: -8.6531, lng: 115.1322 },
            { name: 'Ubud Monkey Forest', time: '13:30', lat: -8.5194, lng: 115.2606 }
        ],
        addExpense() {
            if (!this.newTitle || !this.newIdr) return;
            this.expenses.push({ id: Date.now(), title: this.newTitle, idr: parseFloat(this.newIdr), people: parseInt(this.newPeople) });
            this.newTitle = ''; this.newIdr = '';
        },
        translate(type) {
            this.translateResult = `[正在調用 ${type} 辨識與 Google Translate API...]\n翻譯結果：這道菜是印尼炒飯 (Nasi Goreng)，推薦必點！`;
        },
        openNav(spot) {
            window.open(`https://www.google.com/maps/dir/?api=1&destination=${spot.lat},${spot.lng}&travelmode=driving`, '_blank');
        }
    }" class="max-w-md mx-auto border-3 border-bali-text rounded-sketch p-4 bg-bali-bg shadow-xl mb-24">
        
        <!-- Header 頂部手帳橫幅 -->
        <header class="flex justify-between items-center border-b-3 border-dashed border-bali-text pb-4 mb-4">
            <div>
                <h1 class="text-2xl font-bold tracking-wide">🌿 Bali Chill</h1>
                <p class="text-xs text-gray-500">你的巴里島旅行手帳</p>
            </div>
            <div class="w-12 h-12 bg-bali-accent rounded-full border-2 border-bali-text flex items-center justify-center text-xl">🐱</div>
        </header>

        <!-- 行程規劃模組 -->
        <div x-show="activeTab === 'itinerary'" class="space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="text-xl font-bold">🗓️ Day 1 行程規劃</h2>
                <span class="text-xs bg-red-100 px-2 py-1 rounded border border-bali-text">⚠️ 容易擁堵</span>
            </div>
            <div class="relative border-l-2 border-bali-text ml-4 pl-4 space-y-6">
                <template x-for="spot in spots">
                    <div class="relative">
                        <div class="absolute -left-[23px] top-1 w-3 h-3 bg-bali-primary rounded-full border-2 border-bali-text"></div>
                        <div class="bg-white p-3 border-2 border-bali-text rounded-lg shadow-sm">
                            <span class="text-xs font-bold text-bali-primary" x-text="spot.time"></span>
                            <h3 @click="openNav(spot)" class="font-bold text-lg hover:underline cursor-pointer text-blue-600 flex items-center gap-1">
                                <span x-text="spot.name"></span> 🗺️
                            </h3>
                            <p class="text-xs text-gray-400 mt-1">🚘 Grab/包車預估車程: 45 分鐘</p>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <!-- 記帳與分帳模組 -->
        <div x-show="activeTab === 'expense'" class="space-y-4">
            <h2 class="text-xl font-bold border-b-2 border-bali-text pb-2">💰 印尼盾記帳 / 分帳</h2>
            <div class="bg-white p-4 border-3 border-bali-text rounded-sketch space-y-3">
                <input type="text" placeholder="消費項目" x-model="newTitle" class="w-full p-2 border-2 border-bali-text rounded-md focus:outline-none bg-transparent" />
                <div class="flex gap-2">
                    <input type="number" placeholder="金額 (IDR Rp)" x-model="newIdr" class="w-2/3 p-2 border-2 border-bali-text rounded-md focus:outline-none" />
                    <input type="number" placeholder="人數" x-model="newPeople" class="w-1/3 p-2 border-2 border-bali-text rounded-md focus:outline-none" />
                </div>
                <button @click="addExpense()" class="w-full bg-bali-accent py-2 border-2 border-bali-text rounded-sketch font-bold hover:bg-yellow-200 transition">記一筆 📝</button>
            </div>
            <div class="space-y-2">
                <template x-for="exp in expenses" :key="exp.id">
                    <div class="bg-white p-3 border-2 border-bali-text rounded-lg flex justify-between items-center">
                        <div>
                            <p class="font-bold" x-text="exp.title"></p>
                            <p class="text-xs text-gray-500">共 Rp <span x-text="exp.idr.toLocaleString()"></span> (<span x-text="exp.people"></span>人分)</p>
                        </div>
                        <div class="text-right">
                          <p class="text-sm font-bold text-red-500">每人 Rp <span x-text="Math.round(exp.idr / exp.people).toLocaleString()"></span></p>
                          <p class="text-xs text-gray-400">約 TWD <span x-text="Math.round((exp.idr / exp.people) / 50)"></span></p>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <!-- 翻譯模組 -->
        <div x-show="activeTab === 'translate'" class="space-y-4">
            <h2 class="text-xl font-bold border-b-2 border-bali-text pb-2">🗣️ 隨身翻譯官</h2>
            <textarea x-model="translateText" placeholder="請輸入印尼文，或使用下方拍照看菜單..." class="w-full h-32 p-3 bg-white border-3 border-bali-text rounded-sketch focus:outline-none"></textarea>
            <div class="grid grid-cols-3 gap-2">
                <button @click="translate('手動文字')" class="bg-bali-primary text-white py-2 border-2 border-bali-text rounded-lg text-sm font-bold">⌨️ 文字</button>
                <button @click="translate('相機 OCR')" class="bg-bali-accent py-2 border-2 border-bali-text rounded-lg text-sm font-bold">📸 菜單</button>
                <button @click="translate('語音辨識')" class="bg-green-100 py-2 border-2 border-bali-text rounded-lg text-sm font-bold">🎙️ 語音</button>
            </div>
            <div x-show="translateResult" class="bg-yellow-50 p-3 border-2 border-dashed border-bali-text rounded-md text-sm" x-text="translateResult"></div>
        </div>

        <!-- 小貼士模組 -->
        <div x-show="activeTab === 'tips'" class="space-y-4">
            <div class="bg-blue-50 p-3 border-2 border-bali-text rounded-sketch flex justify-between items-center">
                <div>
                    <p class="font-bold text-sm">庫塔今日天氣 ☀️</p>
                    <p class="text-2xl font-black">29°C</p>
                </div>
                <p class="text-xs text-right text-gray-500">紫外線指數：極高 🔥</p>
            </div>
            <div class="bg-white p-4 border-3 border-bali-text rounded-sketch">
                <h3 class="font-bold mb-2">🎒 行李檢查清單</h3>
                <div class="space-y-2">
                    <template x-for="item in checklist" :key="item.id">
                        <label class="flex items-center space-x-2 cursor-pointer text-sm">
                            <input type="checkbox" x-model="item.done" class="w-4 h-4 accent-bali-primary" />
                            <span :class="item.done ? 'line-through text-gray-400' : ''" x-text="item.text"></span>
                        </label>
                    </template>
                </div>
            </div>
        </div>

        <!-- 底部固定導航欄 -->
        <nav class="fixed bottom-4 left-1/2 transform -translate-x-1/2 w-full max-w-sm bg-white border-3 border-bali-text rounded-sketch py-2 px-4 flex justify-around shadow-lg z-50">
            <button @click="activeTab = 'itinerary'" :class="activeTab === 'itinerary' ? 'text-bali-primary' : ''" class="flex flex-col items-center">
                <span class="text-xl">🗺️</span><span class="text-xs">行程</span>
            </button>
            <button @click="activeTab = 'expense'" :class="activeTab === 'expense' ? 'text-bali-primary' : ''" class="flex flex-col items-center">
                <span class="text-xl">💰</span><span class="text-xs">記帳</span>
            </button>
            <button @click="activeTab = 'translate'" :class="activeTab === 'translate' ? 'text-bali-primary' : ''" class="flex flex-col items-center">
                <span class="text-xl">🗣️</span><span class="text-xs">翻譯</span>
            </button>
            <button @click="activeTab = 'tips'" :class="activeTab === 'tips' ? 'text-bali-primary' : ''" class="flex flex-col items-center">
                <span class="text-xl">📝</span><span class="text-xs">貼士</span>
            </button>
        </nav>

    </div>
</body>
</html>
